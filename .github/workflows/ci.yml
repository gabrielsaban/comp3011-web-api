name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**", "docs/**"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      db_test:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: accidents_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # No main DB service in CI — point DATABASE_URL at the test DB so settings
      # validation passes. All test queries go through TEST_DATABASE_URL anyway.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/accidents_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/accidents_test
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy app

      - name: Run tests
        run: uv run pytest
